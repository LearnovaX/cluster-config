apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        role: worker
      containers:
        - name: frontend
          image: frontend-image
          imagePullPolicy: IfNotPresent
          
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - secretRef:
                name: frontend-secrets
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
