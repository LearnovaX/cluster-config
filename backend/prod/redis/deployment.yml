apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      nodeSelector:
        role: infra

      containers:
        - name: redis

          image: redis:7-alpine

          ports:
            - containerPort: 6379

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"

            limits:
              memory: "256Mi"
              cpu: "200m"

      restartPolicy: Always