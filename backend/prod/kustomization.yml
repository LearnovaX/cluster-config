apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lms

resources:
  - postgres/secrets.yml
  - postgres/service.yml
  - postgres/pvc.yml
  - postgres/statefulset.yml

  - redis/deployment.yml
  - redis/service.yml

  - backend/secrets.yml
  - backend/deployment.yml
  - backend/service.yml

  - celery/worker-deployment.yml
  - celery/beat-deployment.yml

images:
  - name: backend-image
    newName: ghcr.io/LearnovaX/backend
    newTag: initial