apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres

spec:
  serviceName: postgres

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      nodeSelector:
        role: infra

      containers:
        - name: postgres

          image: postgres:17-alpine

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: postgres-secret

          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              memory: "64Mi"
              cpu: "200m"

            limits:
              memory: "256Mi"
              cpu: "500m"
          args:
            - "-c"
            - "shared_buffers=64MB"
            - "-c"
            - "work_mem=2MB"
            - "-c"
            - "maintenance_work_mem=32MB"
            - "-c"
            - "effective_cache_size=128MB"
            - "-c"
            - "max_connections=20"

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 15Gi