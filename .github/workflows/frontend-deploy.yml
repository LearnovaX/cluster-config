name: Frontend Infrastructure Pipeline

on:
  push:
    branches:
      - main

    paths:
      - 'frontend/**'
    
    workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate manifests
        run: |
          kubectl apply --dry-run=client -k frontend/prod

  deploy:
    needs: validate

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Show diff
        run: |
          kubectl diff -k frontend/prod || true

      - name: Deploy frontend stack
        run: |
          kubectl apply -k frontend/prod

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/lms-frontend-deployment -n lms --timeout=120s